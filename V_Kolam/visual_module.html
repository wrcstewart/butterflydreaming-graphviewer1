<!-- Sync check: verified visual_module.html <-> GitHub round-trip (2026-07-01). -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ButterflyDreaming — Visual Module</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      height: 100%;
      overflow: hidden;                  /* A42 §42.9 — module fills its iframe */
    }
    body {
      background: #0a0a0f;
      color: #e8e8e0;
      font-family: Georgia, 'Times New Roman', serif;
      display: flex;
      flex-direction: column;
      gap: 0;                            /* no gap — every pixel goes to the canvas */
      padding: 0;                        /* was 0.6rem — reclaim ~20px each side (A42) */
      box-sizing: border-box;
    }

    /* Status overlays the top-left corner instead of consuming a full row.
       Pointer-events: none so it never blocks a canvas or spinner click. */
    #status {
      position: absolute;
      top: 2px;
      left: 4px;
      z-index: 10;
      font-size: 0.7rem;
      font-style: italic;
      color: #9e9e90;
      letter-spacing: 0.04em;
      pointer-events: none;
      background: rgba(10, 10, 15, 0.6);
      padding: 1px 4px;
      border-radius: 2px;
    }

    .controls {
      display: flex;
      gap: 0.6rem;
      align-items: center;
    }

    button {
      background: #0f0f18;
      border: 1px solid #4a9b8e;
      color: #4a9b8e;
      cursor: pointer;
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 0.8rem;
      letter-spacing: 0.05em;
      padding: 0.45rem 1.1rem;
      text-transform: uppercase;
    }

    button:hover {
      background: #1a2a28;
    }

    button:active {
      background: #243f3b;
    }

    /* A42 fix (user report 2026-07-01) — canvas takes the full available
       height and matches its width to it (square), spinners fill whatever
       horizontal room is left and wrap. Previous grid layout was giving the
       controls column a fixed 170px and starving the canvas of both padding
       and honest height math.
       In a very wide-and-short iframe (e.g. 1574×150 when the chat panel
       is open) this yields canvas 150×150 with spinners in a ~1400px-wide
       band wrapping into a couple of rows. */
    .module-layout {
      flex: 1;
      display: flex;
      flex-direction: row;
      gap: 0;
      min-height: 0;
      min-width: 0;
    }

    .canvas-wrapper {
      flex: 1 1 auto;                    /* takes whatever remains after the panel */
      min-height: 0;
      min-width: 0;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* Narrow viewport (taller than wide) — stack canvas above controls
       so the panel gets its own vertical band. */
    @media (max-aspect-ratio: 1/1) {
      .module-layout {
        flex-direction: column;
      }
      .control-panel {
        flex: 0 0 40vh !important;       /* fixed band along the bottom */
        flex-direction: row !important;
        flex-wrap: wrap;
      }
      .control-row {
        flex: 1 1 30%;
        min-width: 90px;
      }
    }

    /* Default (landscape) control panel — fixed 220 px column on the right.
       Fixed width prevents the canvas from squeezing the panel to zero when
       the iframe is nearly square (as in the preview harness).
       Portrait media query above overrides to a bottom band.
       The <canvas> keeps itself square via its own aspect-ratio + max-*. */
    .control-panel {
      flex: 0 0 220px;
      display: flex;
      flex-direction: column;
      align-items: flex-start;             /* controls hug the left edge, − on the left */
      gap: 4px;
      background: rgba(15, 15, 24, 0.75);
      border: 1px solid rgba(74, 155, 142, 0.2);
      padding: 6px 8px;
      border-radius: 0.4rem;
      min-height: 0;
      min-width: 0;
      overflow-y: auto;
    }

    /* Control cell — one stepper (or select) above, label immediately below.
       Small margin-bottom separates each button-label pair from the next.
       Media-module convention 2026-07-02. */
    .control-row {
      display: flex;
      flex-direction: column;
      gap: 2px;
      flex: 0 0 auto;
      width: 96px;
      margin-bottom: 6px;
    }

    .control-row label {
      font-size: 0.7rem;
      letter-spacing: 0.02em;
      color: #4a9b8e;
      text-align: center;
      font-family: 'Courier New', Courier, monospace;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;      /* no iOS magnifier / text-select on long-press */
    }

    /* Stepper: [−] [value] [+] row. Buttons flex fixed-width, value spans middle. */
    .stepper {
      display: flex;
      align-items: stretch;
      justify-content: space-between;
      gap: 3px;
    }

    .step-btn {
      background: #0f0f18;
      border: 1px solid #4a9b8e;
      color: #4a9b8e;
      font-family: 'Courier New', Courier, monospace;
      font-size: 1rem;
      padding: 0;
      width: 26px;
      height: 26px;
      line-height: 1;
      text-transform: none;
      letter-spacing: 0;
      cursor: pointer;
      border-radius: 3px;
      flex: 0 0 auto;
      touch-action: manipulation;              /* kill iOS double-tap zoom on rapid taps */
      user-select: none;
      -webkit-user-select: none;               /* older iOS Safari — text-select on long press */
      -webkit-touch-callout: none;             /* suppress long-press callout / magnifier */
      -webkit-tap-highlight-color: transparent;/* no grey flash halo */
    }

    .step-btn:hover  { background: #1a2a28; }
    .step-btn:active { background: #243f3b; }
    .step-btn:disabled { opacity: 0.4; cursor: not-allowed; }

    .stepper-value {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Courier New', Courier, monospace;
      font-size: 0.78rem;
      color: #e8e8e0;
      background: #0f0f18;
      border: 1px solid #2a2a3a;
      padding: 2px;
      border-radius: 3px;
      min-width: 0;
      user-select: none;
      -webkit-user-select: none;
      -webkit-touch-callout: none;
    }

    /* Hidden source input backing each stepper — kept in the DOM so existing
       JS can still read/write .value, min, max, step. */
    .stepper-source {
      display: none;
    }

    /* Set by the host harness via postMessage bd_ui_config { hideControls: true }.
       Preview.html supplies its own outer stepper column; hiding the internal
       one lets the canvas take the whole iframe width. */
    body.controls-hidden .control-panel { display: none; }
    body.controls-hidden .canvas-wrapper { flex: 1 1 auto; }

    /* Selects retain their native appearance for iOS/mobile compatibility. */
    .control-panel select {
      width: 100%;
      background: #0f0f18;
      color: #e8e8e0;
      border: 1px solid #2a2a3a;
      font-family: 'Courier New', Courier, monospace;
      font-size: 0.9rem;          /* ≥16px logical to avoid iOS auto-zoom on focus */
      padding: 4px;
      accent-color: #4a9b8e;
      outline: none;
    }

    .control-panel select:focus {
      border-color: #4a9b8e;
    }

    canvas {
      border: 1px solid #4a9b8e;
      border-opacity: 0.3;
      display: block;
      /* A42 §42.9 — fit inside wrapper without overflowing either axis */
      max-width: 100%;
      max-height: 100%;
      aspect-ratio: 1 / 1;
    }
  </style>
</head>
<body>

  <div id="status">Ready</div>

  <div class="module-layout">

  <div class="canvas-wrapper">
    <canvas id="kolam-canvas"></canvas>
  </div>

  <div class="control-panel">
    <!-- Media-module control convention (2026-07-02):
         · every numeric-arg %%bd_ directive gets a +/− stepper (buttons above, label below)
         · label text = the directive name after %%bd_ (verbatim, incl. underscore)
         · angle_minutes / angle_seconds hidden — drift-automation still uses them -->
    <div class="control-row">
      <div class="stepper">
        <button class="step-btn" type="button" data-target="symmetry-select" data-delta="-1">−</button>
        <span class="stepper-value" data-target="symmetry-select">8</span>
        <button class="step-btn" type="button" data-target="symmetry-select" data-delta="1">+</button>
      </div>
      <label>symmetry</label>
      <input id="symmetry-select" class="stepper-source" type="number" min="1" max="16" step="1" value="8">
    </div>

    <div class="control-row">
      <div class="stepper">
        <button class="step-btn" type="button" data-target="depth-select" data-delta="-1">−</button>
        <span class="stepper-value" data-target="depth-select">4</span>
        <button class="step-btn" type="button" data-target="depth-select" data-delta="1">+</button>
      </div>
      <label>depth</label>
      <input id="depth-select" class="stepper-source" type="number" min="1" max="5" step="1" value="4">
    </div>

    <div class="control-row">
      <div class="stepper">
        <button class="step-btn" type="button" data-target="step-slider" data-delta="-1">−</button>
        <span class="stepper-value" data-target="step-slider">40</span>
        <button class="step-btn" type="button" data-target="step-slider" data-delta="1">+</button>
      </div>
      <label>step</label>
      <input id="step-slider" class="stepper-source" type="number" min="10" max="200" step="1" value="40">
    </div>

    <div class="control-row">
      <div class="stepper">
        <button class="step-btn" type="button" data-target="angle-slider" data-delta="-1">−</button>
        <span class="stepper-value" data-target="angle-slider">45</span>
        <button class="step-btn" type="button" data-target="angle-slider" data-delta="1">+</button>
      </div>
      <label>angle</label>
      <input id="angle-slider" class="stepper-source" type="number" min="5" max="90" step="1" value="45">
    </div>

    <!-- angle_minutes ("Angle Fine") hidden per user 2026-07-02.
         angle_seconds already hidden. Both remain in DOM so the drift-automation
         tick (driftTick) can still carry seconds → minutes → degrees. -->
    <input id="angle-minutes-slider" type="hidden" value="0">
    <input id="angle-seconds-slider" type="hidden" value="0">

    <div class="control-row">
      <div class="stepper">
        <button class="step-btn" type="button" data-target="angle-drift-slider" data-delta="-1">−</button>
        <span class="stepper-value" data-target="angle-drift-slider">0</span>
        <button class="step-btn" type="button" data-target="angle-drift-slider" data-delta="1">+</button>
      </div>
      <label>angle_drift</label>
      <input id="angle-drift-slider" class="stepper-source" type="number" min="0" max="10" step="1" value="0">
    </div>

    <div class="control-row">
      <div class="stepper">
        <button class="step-btn" type="button" data-target="colour-speed-slider" data-delta="-1">−</button>
        <span class="stepper-value" data-target="colour-speed-slider">4.0x</span>
        <button class="step-btn" type="button" data-target="colour-speed-slider" data-delta="1">+</button>
      </div>
      <label>colour_speed</label>
      <input id="colour-speed-slider" class="stepper-source" type="number" min="-2" max="4" step="1" value="2">
    </div>

    <div class="control-row">
      <div class="stepper">
        <button class="step-btn" type="button" data-target="weight-slider" data-delta="-1">−</button>
        <span class="stepper-value" data-target="weight-slider">1.5</span>
        <button class="step-btn" type="button" data-target="weight-slider" data-delta="1">+</button>
      </div>
      <label>weight</label>
      <input id="weight-slider" class="stepper-source" type="number" min="0.5" max="5" step="0.1" value="1.5">
    </div>

    <div class="control-row">
      <div class="stepper">
        <button class="step-btn" type="button" data-target="saturation-slider" data-delta="-1">−</button>
        <span class="stepper-value" data-target="saturation-slider">100</span>
        <button class="step-btn" type="button" data-target="saturation-slider" data-delta="1">+</button>
      </div>
      <label>saturation</label>
      <input id="saturation-slider" class="stepper-source" type="number" min="0" max="100" step="1" value="100">
    </div>

    <div class="control-row">
      <div class="stepper">
        <button class="step-btn" type="button" data-target="lightness-slider" data-delta="-1">−</button>
        <span class="stepper-value" data-target="lightness-slider">65</span>
        <button class="step-btn" type="button" data-target="lightness-slider" data-delta="1">+</button>
      </div>
      <label>lightness</label>
      <input id="lightness-slider" class="stepper-source" type="number" min="0" max="100" step="1" value="65">
    </div>

  </div>

  </div>

  <!-- lindenmayer library for L-system rewriting -->
  <script src="https://cdn.jsdelivr.net/npm/lindenmayer/dist/lindenmayer.browser.js"></script>

  <script>
    'use strict';

    // ── Element refs ──────────────────────────────────────────────────────────
    const statusEl       = document.getElementById('status');
    const symmetrySelect = document.getElementById('symmetry-select');
    const depthSelect    = document.getElementById('depth-select');
    const stepSlider     = document.getElementById('step-slider');
    const angleSlider    = document.getElementById('angle-slider');
    const angleMinutesSlider = document.getElementById('angle-minutes-slider');
    const angleSecondsSlider = document.getElementById('angle-seconds-slider');
    const angleDriftSlider  = document.getElementById('angle-drift-slider');
    const colourSpeedSlider = document.getElementById('colour-speed-slider');
    const weightSlider   = document.getElementById('weight-slider');
    const saturationSlider = document.getElementById('saturation-slider');
    const lightnessSlider  = document.getElementById('lightness-slider');
    const canvas         = document.getElementById('kolam-canvas');
    const ctx            = canvas.getContext('2d');
    const canvasWrapper  = document.querySelector('.canvas-wrapper');

    function updateCanvasSize() {
      // A42 §42.9 — canvas is square; take the smaller of the wrapper's
      // width and height so it never overflows the iframe in either axis.
      // Fall back to width if height is 0 (early boot before layout).
      const w = canvasWrapper.clientWidth;
      const h = canvasWrapper.clientHeight;
      const size = Math.floor(h > 0 ? Math.min(w, h) : w);
      if (size > 0) {
        canvas.width = size;
        canvas.height = size;
      }
    }

    // ── Module state ──────────────────────────────────────────────────────────
    let storedText    = ''; // full node text, kept current by render()
    let lastError     = null;
    let driftInterval = null; // setInterval handle for angle drift automation

    // ── Helpers ───────────────────────────────────────────────────────────────
    const setStatus = (msg) => { statusEl.textContent = msg; };

    const postToParent = (message) => {
      window.parent.postMessage(message, '*');
    };

    // ── %%bd_ Parser ──────────────────────────────────────────────────────────
    // Two-state machine: text state and bracket state.
    // Returns object of directive name/value pairs.
    // Multi-line directives with [ ] have their raw text (including newlines) as value.
    function parseBD(text) {
      const directives = {};
      const lines = text.split('\n');
      let state = 'text';
      let currentDirective = null;
      let currentLines = [];

      for (const line of lines) {
        if (state === 'text') {
          if (line.startsWith('%%bd_')) {
            const spaceIdx = line.indexOf(' ');
            if (spaceIdx === -1) continue;
            const name = line.slice(5, spaceIdx);
            const value = line.slice(spaceIdx + 1).trim();
            if (value === '[') {
              currentDirective = name;
              currentLines = [];
              state = 'bracket';
            } else {
              directives[name] = value;
            }
          }
        } else if (state === 'bracket') {
          if (line.trim() === '%%bd_]') {
            directives[currentDirective] = currentLines.join('\n');
            state = 'text';
          } else {
            currentLines.push(line);
          }
        }
      }
      return directives;
    }

    // ── Score Parser ──────────────────────────────────────────────────────────
    // Extract axiom and production rules from %%bd_score content.
    function parseScore(scoreText) {
      const result = { axiom: '', productions: {} };
      for (const line of scoreText.split('\n')) {
        const trimmed = line.trim();
        if (!trimmed || trimmed.startsWith('#')) continue;
        if (trimmed.startsWith('axiom:')) {
          result.axiom = trimmed.slice(6).trim();
        } else {
          const colonIdx = trimmed.indexOf(':');
          if (colonIdx !== -1) {
            const symbol = trimmed.slice(0, colonIdx).trim();
            const replacement = trimmed.slice(colonIdx + 1).trim();
            result.productions[symbol] = replacement;
          }
        }
      }
      return result;
    }

    function safeParseNumber(value, fallback) {
      const n = parseFloat(value);
      return Number.isFinite(n) ? n : fallback;
    }

    function safeParseInt(value, fallback) {
      const n = parseInt(value, 10);
      return Number.isFinite(n) ? n : fallback;
    }

    function formatDirectiveNumber(value) {
      if (!Number.isFinite(value)) return String(value);
      const normalized = Math.round(value * 100) / 100;
      return normalized.toString();
    }

    function setControlValues(directives) {
      if (!symmetrySelect) return;
      const symmetryValue = Math.min(Math.max(safeParseInt(directives.symmetry, 8), 1), 16);
      symmetrySelect.value = String(symmetryValue);
      const depthValue = Math.min(Math.max(safeParseInt(directives.depth, 4), 1), 5);
      depthSelect.value = String(depthValue);
      stepSlider.value = String(Math.min(Math.max(safeParseNumber(directives.step, 40), 10), 200));
      angleSlider.value = String(Math.min(Math.max(safeParseNumber(directives.angle, 45), 5), 90));
      angleMinutesSlider.value = String(Math.min(Math.max(safeParseNumber(directives.angle_minutes, 0), 0), 59));
      // angle_seconds is now internal-only — never present in the script.
      // Only touch the slider if the directive was explicitly supplied
      // (legacy scripts / _copy harness); otherwise leave the running total
      // alone so the drift accumulator survives between renders.
      if (directives.angle_seconds !== undefined) {
        angleSecondsSlider.value = String(Math.min(Math.max(safeParseNumber(directives.angle_seconds, 0), 0), 59));
      }
      angleDriftSlider.value   = String(Math.min(Math.max(safeParseInt(directives.angle_drift, 0), 0), 10));
      manageDriftInterval();
      const colourSpeedValueParsed = Math.min(Math.max(safeParseNumber(directives.colour_speed, 4), 0.25), 16);
      const colourSpeedExponent = Math.min(Math.max(Math.round(Math.log2(colourSpeedValueParsed)), -2), 4);
      colourSpeedSlider.value = String(colourSpeedExponent);
      weightSlider.value = String(Math.min(Math.max(safeParseNumber(directives.weight, 1.5), 0.5), 5));
      saturationSlider.value = String(Math.min(Math.max(safeParseNumber(directives.saturation, 100), 0), 100));
      lightnessSlider.value = String(Math.min(Math.max(safeParseNumber(directives.lightness, 65), 0), 100));

      // Update value displays
      updateValueDisplays();
    }

    function updateValueDisplays() {
      // Sync every stepper's centre span from its hidden source input.
      // colour_speed is stored as an exponent (-2..4) but the meaningful value
      // is the multiplier 2^exp — show that in the readout so the label
      // (colour_speed) and the number in the box tell the same story.
      document.querySelectorAll('.stepper-value').forEach((span) => {
        const targetId = span.dataset.target;
        const input = targetId && document.getElementById(targetId);
        if (!input) return;
        if (targetId === 'colour-speed-slider') {
          const exp = parseFloat(input.value);
          span.textContent = Number.isFinite(exp) ? `${(2 ** exp).toFixed(1)}x` : input.value;
        } else {
          span.textContent = input.value;
        }
      });
    }

    function setDirectiveValue(nodeText, name, value) {
      const lines = nodeText.split('\n');
      const directiveName = `%%bd_${name}`;
      let replaced = false;
      const updated = lines.map((line) => {
        if (line.startsWith(`${directiveName} `)) {
          replaced = true;
          return `${directiveName} ${value}`;
        }
        return line;
      });
      if (!replaced) {
        const insertAt = updated.findIndex((line) => line.trim() === '%%bd_score [');
        const index = insertAt === -1 ? updated.length : insertAt;
        updated.splice(index, 0, `${directiveName} ${value}`);
      }
      return updated.join('\n');
    }

    function applyControlDirectives(nodeText) {
      let text = nodeText;
      const controlValues = {
        symmetry: symmetrySelect.value,
        depth: depthSelect.value,
        step: stepSlider.value,
        angle: angleSlider.value,
        angle_minutes: angleMinutesSlider.value,
        // angle_seconds intentionally NOT written into the script — it's a
        // sub-arc-minute drift accumulator that lives only in the module.
        angle_drift:   angleDriftSlider.value,
        colour_speed: formatDirectiveNumber(2 ** Number(colourSpeedSlider.value)),
        weight: weightSlider.value,
        saturation: saturationSlider.value,
        lightness: lightnessSlider.value
      };
      for (const [name, value] of Object.entries(controlValues)) {
        text = setDirectiveValue(text, name, value);
      }
      return text;
    }

    function handleControlChange() {
      updateValueDisplays();
      if (!storedText) return;
      const updatedText = applyControlDirectives(storedText);
      render(updatedText);
    }

    const controlInputs = [
      symmetrySelect,
      depthSelect,
      stepSlider,
      angleSlider,
      angleMinutesSlider,
      angleSecondsSlider,
      angleDriftSlider,
      colourSpeedSlider,
      weightSlider,
      saturationSlider,
      lightnessSlider
    ];

    controlInputs.forEach((input) => {
      input.addEventListener('input', handleControlChange);
    });

    // ── Stepper (+/−) buttons ─────────────────────────────────────────────────
    // Media-module convention 2026-07-02: each numeric-arg %%bd_ directive gets a
    // pair of buttons flanking a value display. The hidden source input still
    // owns min / max / step / value; buttons read those attrs, clamp, and dispatch
    // a native 'input' event so the existing handleControlChange chain fires.
    function stepControl(input, delta) {
      const min  = parseFloat(input.min);
      const max  = parseFloat(input.max);
      const step = parseFloat(input.step) || 1;
      const cur  = parseFloat(input.value);
      if (!Number.isFinite(cur)) return;
      let next = cur + delta * step;
      if (Number.isFinite(min)) next = Math.max(min, next);
      if (Number.isFinite(max)) next = Math.min(max, next);
      // Round to the step grid, then trim FP noise (0.1 * 3 = 0.30000000000000004).
      if (Number.isFinite(step) && step > 0) {
        next = Math.round(next / step) * step;
      }
      next = parseFloat(next.toFixed(4));
      const strVal = String(next);
      if (input.value === strVal) return;      // hit min/max — no-op
      input.value = strVal;
      input.dispatchEvent(new Event('input', { bubbles: true }));
    }

    document.querySelectorAll('.step-btn').forEach((btn) => {
      let holdTimer     = null;
      let repeatTimer   = null;

      const doStep = () => {
        const input = document.getElementById(btn.dataset.target);
        const delta = parseFloat(btn.dataset.delta);
        if (!input || input.disabled) return;
        stepControl(input, delta);
      };

      const start = (ev) => {
        if (btn.disabled) return;
        // Prevent the follow-up synthetic 'click' + iOS text-selection.
        ev.preventDefault();
        try { btn.setPointerCapture(ev.pointerId); } catch (_) {}
        doStep();
        holdTimer = setTimeout(() => {
          repeatTimer = setInterval(doStep, 60);
        }, 400);
      };

      const stop = () => {
        if (holdTimer)   { clearTimeout(holdTimer);   holdTimer   = null; }
        if (repeatTimer) { clearInterval(repeatTimer); repeatTimer = null; }
      };

      btn.addEventListener('pointerdown',   start);
      btn.addEventListener('pointerup',     stop);
      btn.addEventListener('pointercancel', stop);
      btn.addEventListener('pointerleave',  stop);
    });

    // ── Angle Drift Automation ────────────────────────────────────────────────
    // Advance angle by drift (seconds of arc) on a depth-dependent interval,
    // propagating carry through seconds → minutes → degrees. Uses setTimeout
    // so the interval can change dynamically between ticks.

    // Depth-dependent tick interval (Amendment 17)
    function driftIntervalMs() {
      const depth = parseInt(depthSelect.value, 10);
      const table = { 1: 100, 2: 100, 3: 100, 4: 200, 5: 1000 };
      return table[depth] ?? 200;
    }

    function manageDriftInterval() {
      const drift = parseInt(angleDriftSlider.value, 10);
      if (drift === 0) {
        if (driftInterval !== null) {
          clearTimeout(driftInterval);
          driftInterval = null;
        }
      } else if (driftInterval === null) {
        driftInterval = setTimeout(driftTick, driftIntervalMs());
      }
    }

    function driftTick() {
      // Do NOT null driftInterval here — manageDriftInterval (called via render →
      // setControlValues) checks it to avoid double-scheduling. We overwrite the
      // stale handle at the end once we know whether to continue.
      const drift = parseInt(angleDriftSlider.value, 10);
      if (drift === 0) {
        driftInterval = null; // stopped — allow manageDriftInterval to restart later
        return;
      }

      let secs = parseInt(angleSecondsSlider.value, 10) + drift;
      let mins = parseInt(angleMinutesSlider.value, 10);
      let degs = parseInt(angleSlider.value, 10);

      // Propagate carry upward
      mins += Math.floor(secs / 60);
      secs  = secs % 60;

      degs += Math.floor(mins / 60);
      mins  = mins % 60;

      degs  = ((degs % 360) + 360) % 360;

      angleSlider.value        = String(degs);
      angleMinutesSlider.value = String(mins);
      angleSecondsSlider.value = String(secs);

      updateValueDisplays();

      if (storedText) {
        const updatedText = applyControlDirectives(storedText);
        render(updatedText);
      }

      // Broadcast the drift-updated fields to the host harness so its outer
      // steppers / textarea can stay in sync while drift is running.
      // Only the three fields that change during drift are sent — keeps the
      // message small (~5 msg/sec at depth 4).
      postToParent({
        type: 'bd_state_update',
        angle: degs,
        angle_minutes: mins,
        angle_seconds: secs
      });

      // Overwrite the now-fired (stale) handle with the next tick
      driftInterval = setTimeout(driftTick, driftIntervalMs());
    }

    // Manage timeout whenever the drift slider moves
    angleDriftSlider.addEventListener('input', manageDriftInterval);

    // ── Turtle State ──────────────────────────────────────────────────────────
    function createTurtleState(x, y) {
      return {
        x: x,
        y: y,
        angle: 0,
        stack: []
      };
    }

    // ── Curved Line Drawing ───────────────────────────────────────────────────
    // Draw a quadratic bezier curve for a turtle forward step.
    // Control point offset perpendicular to direction.
    function drawCurvedStep(ctx, state, step) {
      const rad = (state.angle * Math.PI) / 180;
      const nextX = state.x + Math.cos(rad) * step;
      const nextY = state.y + Math.sin(rad) * step;

      // Control point perpendicular to direction
      const perpRad = rad + Math.PI / 2;
      const cpOffset = step * 0.3;
      const cpx = (state.x + nextX) / 2 + Math.cos(perpRad) * cpOffset;
      const cpy = (state.y + nextY) / 2 + Math.sin(perpRad) * cpOffset;

      ctx.quadraticCurveTo(cpx, cpy, nextX, nextY);
      state.x = nextX;
      state.y = nextY;
    }

    // ── Turtle Path Renderer ─────────────────────────────────────────────────
    // Draw the L-system path to an offscreen context, optionally tracking hue.
    function renderTurtlePath(lsystemResult, params, ctx) {
      const state = createTurtleState(canvas.width / 2, canvas.height / 2);
      const startX = state.x;
      const startY = state.y;
      const angleTracked = params.stroke.toLowerCase() === 'angle';
      const baseStroke = angleTracked ? null : params.stroke;

      ctx.lineWidth = params.weight;
      ctx.lineCap = 'round';
      ctx.lineJoin = 'round';

      for (const symbol of lsystemResult) {
        switch (symbol) {
          case 'F': {
            const rad = (state.angle * Math.PI) / 180;
            const nextX = state.x + Math.cos(rad) * params.effectiveStep;
            const nextY = state.y + Math.sin(rad) * params.effectiveStep;
            const perpRad = rad + Math.PI / 2;
            const cpOffset = params.effectiveStep * 0.3;
            const cpx = (state.x + nextX) / 2 + Math.cos(perpRad) * cpOffset;
            const cpy = (state.y + nextY) / 2 + Math.sin(perpRad) * cpOffset;

            ctx.beginPath();
            ctx.moveTo(state.x, state.y);
            ctx.quadraticCurveTo(cpx, cpy, nextX, nextY);
            if (angleTracked) {
              const hue = (((state.angle % (360 * params.colourSpeed)) + (360 * params.colourSpeed)) % (360 * params.colourSpeed)) / params.colourSpeed;
              ctx.strokeStyle = `hsl(${hue}, ${params.saturation}%, ${params.lightness}%)`;
            } else {
              ctx.strokeStyle = baseStroke;
            }
            ctx.stroke();

            state.x = nextX;
            state.y = nextY;
            break;
          }

          case 'f': {
            const rad = (state.angle * Math.PI) / 180;
            state.x += Math.cos(rad) * params.effectiveStep;
            state.y += Math.sin(rad) * params.effectiveStep;
            break;
          }

          case '+':
            state.angle += params.effectiveAngle;
            break;

          case '-':
            state.angle -= params.effectiveAngle;
            break;

          case '[':
            state.stack.push({ x: state.x, y: state.y, angle: state.angle });
            break;

          case ']':
            if (state.stack.length > 0) {
              const saved = state.stack.pop();
              state.x = saved.x;
              state.y = saved.y;
              state.angle = saved.angle;
            }
            break;

          case '|':
            state.angle += 180;
            break;

          default:
            break;
        }
      }

      return {
        startX,
        startY,
        endX: state.x,
        endY: state.y
      };
    }

    // ── Symmetry Wrapper ──────────────────────────────────────────────────────
    // Stamp the offscreen canvas n times with rotational symmetry.
    function applySymmetry(offscreen, symmetry) {
      const cx = canvas.width / 2;
      const cy = canvas.height / 2;
      const sectorAngle = (2 * Math.PI) / symmetry;

      ctx.save();
      ctx.translate(cx, cy);
      for (let i = 0; i < symmetry; i++) {
        ctx.rotate(sectorAngle);
        ctx.drawImage(offscreen, -cx, -cy);
      }
      ctx.restore();
    }

    // ── Closure Checker ───────────────────────────────────────────────────────
    // Check if the path closes (end position ≈ start position).
    function checkClosure(startX, startY, endX, endY, step) {
      const dist = Math.sqrt((endX - startX) ** 2 + (endY - startY) ** 2);
      return dist < step / 2;
    }

    // ── Render Function ───────────────────────────────────────────────────────
    // Called on BD_INIT. Parses directives, runs L-system, renders kolam.
    function render(nodeText) {
      try {
        setStatus('Rendering…');
        storedText = nodeText;

        if (typeof nodeText !== 'string') {
          console.error('visual_module: render() expected text string, got:', nodeText);
          throw new Error('No valid text provided in BD_INIT payload');
        }

        // Parse directives
        const directives = parseBD(nodeText);

        // Extract and parse score block
        const scoreRaw = directives.score;
        if (!scoreRaw) {
          throw new Error('No score found in node text');
        }

        const score = parseScore(scoreRaw);
        if (!score.axiom) {
          throw new Error('No axiom found in score');
        }

        // Apply defaults for any missing rendering parameters
        const params = {
          symmetry:   safeParseInt(directives.symmetry, 8),
          depth:      Math.min(Math.max(safeParseInt(directives.depth, 4), 1), 5),
          step:       Math.min(Math.max(safeParseNumber(directives.step, 40), 10), 200),
          angle:      Math.min(Math.max(safeParseNumber(directives.angle, 45), 5), 90),
          stroke:     directives.stroke                  || 'angle',   /* A42 fix: was '#4a9b8e' — that killed hue cycling when the script omitted %%bd_stroke angle. */
          background: directives.background             || '#0a0a0f',
          weight:     Math.min(Math.max(safeParseNumber(directives.weight, 1.5), 0.5), 5),
          saturation: Math.min(Math.max(safeParseNumber(directives.saturation, 100), 0), 100),
          lightness:  Math.min(Math.max(safeParseNumber(directives.lightness, 65), 0), 100),
          colourSpeed: Math.min(Math.max(safeParseNumber(directives.colour_speed, 4), 0.25), 16)
        };

        // Calculate effective angle including fine (minutes) and very fine (seconds) adjustments.
        // angle_seconds is internal-only (not in the script) — read live from the slider so drift
        // updates the visual every tick, not just when minutes carry over.
        const liveSeconds = safeParseNumber(angleSecondsSlider.value, 0);
        params.effectiveAngle = params.angle + (safeParseNumber(directives.angle_minutes, 0) / 60) + (liveSeconds / 3600);
        // Ensure colourSpeed is valid for hue cycling
        if (!Number.isFinite(params.colourSpeed) || params.colourSpeed <= 0) {
          params.colourSpeed = 4;
        }

        // Cap depth at 5
        if (params.depth > 5) {
          params.depth = 5;
          setStatus('Rendering… (depth capped at 5)');
        }

        updateCanvasSize();
        // Clear canvas with background
        ctx.fillStyle = params.background;
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // Add subtle border
        ctx.strokeStyle = '#4a9b8e';
        ctx.globalAlpha = 0.3;
        ctx.lineWidth = 1;
        ctx.strokeRect(0, 0, canvas.width, canvas.height);
        ctx.globalAlpha = 1;

        // Run L-system rewriting
        const lsystem = new LSystem({
          axiom: score.axiom,
          productions: score.productions
        });
        lsystem.iterate(params.depth);
        const lsystemResult = lsystem.getString();

        if (!lsystemResult) {
          throw new Error('L-system produced no output');
        }

        // Compute depth-scaled step size so the path stays within canvas bounds.
        const effectiveStep = params.step / Math.pow(3, Math.max(0, params.depth - 1));
        params.effectiveStep = effectiveStep;

        setControlValues(directives);

        const offscreen = document.createElement('canvas');
        offscreen.width = canvas.width;
        offscreen.height = canvas.height;
        const octx = offscreen.getContext('2d');

        const turtle = renderTurtlePath(lsystemResult, params, octx);

        // Apply symmetry
        applySymmetry(offscreen, params.symmetry);

        setStatus('Ready');

        lastError = null;

      } catch (err) {
        lastError = err.message;
        setStatus(`Error: ${err.message}`);
        postToParent({ type: 'BD_ERROR', payload: { message: err.message } });
        console.error('render error:', err);
      }
    }

    window.addEventListener('resize', () => {
      updateCanvasSize();
      if (storedText) {
        render(storedText);
      }
    });

    // ── Waiting state (A42 §42.4) ────────────────────────────────────────────
    // Module starts in a waiting state — no render until first bd_script_update.
    // All spinner / select inputs disabled; canvas shows centred "Waiting for
    // script..." message. First bd_script_update clears both.
    let waitingForFirstScript = true;

    function disableControls() {
      document.querySelectorAll('.control-panel input, .control-panel select, .control-panel .step-btn')
        .forEach(el => { el.disabled = true; });
    }
    function enableControls() {
      document.querySelectorAll('.control-panel input, .control-panel select, .control-panel .step-btn')
        .forEach(el => { el.disabled = false; });
    }
    function drawWaitingMessage() {
      updateCanvasSize();
      ctx.fillStyle = '#0a0a0f';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#9e9e90';
      ctx.font = 'italic 18px Georgia, "Times New Roman", serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('Waiting for script...', canvas.width / 2, canvas.height / 2);
      // A42 diagnostic — surface the measured dimensions so we can tell
      // whether the wrapper (layout) or the canvas (JS sizing) is the
      // constraint. Remove once canvas-size issue is resolved.
      const w = canvasWrapper.clientWidth;
      const h = canvasWrapper.clientHeight;
      const bw = document.body.clientWidth;
      const bh = document.body.clientHeight;
      setStatus(`Waiting… body ${bw}×${bh}  wrap ${w}×${h}  canvas ${canvas.width}×${canvas.height}`);
    }

    // Wrapped render — first call clears the waiting state.
    function renderFromScript(scriptText) {
      if (waitingForFirstScript) {
        waitingForFirstScript = false;
        enableControls();
      }
      render(scriptText);
    }

    // Initialise waiting state.
    disableControls();
    // Sync stepper display spans from their source-input defaults so any
    // HTML/JS drift shows the correct pre-render value (esp. colour_speed's
    // exponent → multiplier conversion).
    updateValueDisplays();
    // Defer initial draw until layout has flushed — otherwise the wrapper's
    // clientWidth / clientHeight can still be 0 and the canvas ends up at its
    // default 300×150 (A42 fix — the "canvas only 40% of iframe depth" bug).
    requestAnimationFrame(() => requestAnimationFrame(drawWaitingMessage));

    // ResizeObserver on the wrapper handles every re-layout: initial flush,
    // iframe/window resize, orientation change, content shift. Redraws the
    // waiting message OR re-renders the stored script at the new size.
    if (typeof ResizeObserver === 'function') {
      const ro = new ResizeObserver(() => {
        if (waitingForFirstScript) {
          drawWaitingMessage();
        } else if (storedText) {
          updateCanvasSize();
          render(storedText);
        }
      });
      ro.observe(canvasWrapper);
    }
    // Belt-and-braces for older browsers without ResizeObserver.
    window.addEventListener('resize', () => {
      if (waitingForFirstScript) drawWaitingMessage();
    });

    // ── Message Handlers ──────────────────────────────────────────────────────
    // A42 protocol names are bd_script_*. Legacy BD_INIT / BD_REQUEST_UPDATE
    // kept as aliases so the reference index_copy.html harness still works.
    window.addEventListener('message', (event) => {
      try {
        const { type, payload, script } = event.data;
        switch (type) {
          case 'bd_script_update': {
            const s = typeof script === 'string' ? script : '';
            renderFromScript(s);
            break;
          }
          case 'bd_script_request': {
            window.parent.postMessage(
              { type: 'bd_script_response', script: storedText },
              '*'
            );
            break;
          }

          case 'BD_INIT': {
            const rawText = payload && payload.text;
            const nodeText = typeof rawText === 'string' ? rawText : rawText == null ? '' : String(rawText);
            renderFromScript(nodeText);
            break;
          }
          case 'BD_STOP':
            if (driftInterval !== null) { clearTimeout(driftInterval); driftInterval = null; }
            ctx.fillStyle = '#0a0a0f';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            setStatus('Stopped');
            break;
          case 'BD_REQUEST_UPDATE':
            postToParent({ type: 'BD_UPDATE', payload: { text: storedText } });
            break;

          // bd_ui_config: host harness (preview.html, BD viewer, etc.) tells
          // the module to hide its own control panel because the harness is
          // supplying an outer control surface. The renderer + canvas stay
          // fully functional — only the built-in stepper column is hidden.
          case 'bd_ui_config': {
            const hide = event.data && event.data.hideControls === true;
            document.body.classList.toggle('controls-hidden', hide);
            // Canvas needs a resize kick so it fills the reclaimed space.
            updateCanvasSize();
            if (storedText) render(storedText);
            break;
          }

          default:
            // Ignore unrecognised types
            break;
        }
      } catch (err) {
        console.error('visual_module: error handling postMessage', err);
      }
    });

    // ── Signal module loaded ──────────────────────────────────────────────────
    postToParent({ type: 'BD_READY' });
  </script>

</body>
</html>
