<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ButterflyDreaming — Graph Viewer</title>
  <link rel="stylesheet" href="style.css?v=109">
</head>
<body>
  <div id="title-bar">Butterfly Dreaming Development</div>
  <div id="bc-spacer"></div>
  <div id="cy-buddy"></div>
  <div id="cy-you"></div>
  <div id="chat-panel">
    <div id="chat-stack"></div>
  </div>
  <div id="default-panel">
    <div id="default-stack">
      <div class="card system">
        <div class="card-head">System</div>
        <div class="card-body" id="default-card-body">Welcome! Please click or tap the node below to start your journey</div>
      </div>
    </div>
  </div>
  <div id="action-bar">
    <button id="default-save-btn" type="button" disabled>Save</button>
    <button id="chat-send-btn" type="button" disabled>Send</button>
    <button id="copy-down-btn" type="button" title="Copy Down (card → module)">↓</button>
    <button id="copy-up-btn" type="button" title="Copy Up (module → card)" disabled>↑</button>
    <!-- 2026-07-15: New Card + BD-self Copy Link both live between ↑ and
         the status span. Two-line labels so each button stays narrow —
         phone real-estate on the action bar was tight. -->
    <button id="chat-new-card-btn" type="button" title="Start a new local (compose) card at the top of the stack">New<br>Card</button>
    <button id="copy-link-btn" type="button" title="Copy a link back to this BD state (current node + top card) to the clipboard">Copy<br>Link</button>
    <span id="default-save-status"></span>
    <span id="view-mode-toggle">
      <label><input type="radio" name="view-mode" value="nodes" checked> Nodes</label>
      <label><input type="radio" name="view-mode" value="player"> Player</label>
    </span>
  </div>
  <div id="cy"></div>
  <!-- No hardcoded src: viewer.js's MM1.6 loader owns the iframe's URL and
       only sets it after attaching the BD_READY listener, so we can't race
       past the initial BD_READY message from a preloaded module. -->
  <iframe id="visual-iframe"
          title="ButterflyDreaming Visual Module"
          sandbox="allow-scripts allow-same-origin"></iframe>

  <!-- MM3 (2026-07-12) invite panel — visible only in Player mode
       (body.player-active toggled by setViewMode). Sits in the 220 px band
       reserved on the right of #visual-iframe by positionCyEl. Buttons
       placeholder; wiring follows in a later commit. -->
  <aside id="bd-invite-panel-viewer">
    <p id="bd-invite-text-viewer">Extend</p>
    <div id="bd-invite-actions-viewer">
      <button id="jump-to-ext-btn"      type="button" title="Open the External Website in this tab, carrying the current script + node context">Jump to</button>
      <button id="copy-link-to-ext-btn" type="button" title="Copy an External Website link (with current script + node context) to the clipboard">Copy Link to</button>
    </div>
    <p id="bd-invite-target-viewer">External<br>Website</p>
  </aside>
  <div id="media-bar"></div>
  <div id="cluster-editor-bar" style="display:none">
    <div class="spinner-group">
      <label>tagged_as</label>
      <input type="number" id="sp-tagged-as" min="0" max="1" step="0.1" value="0.5">
    </div>
    <div class="spinner-group">
      <label>resonates_with</label>
      <input type="number" id="sp-resonates-with" min="0" max="1" step="0.1" value="0.0">
    </div>
    <div class="spinner-group">
      <label>bridges_to</label>
      <input type="number" id="sp-bridges-to" min="0" max="1" step="0.1" value="0.0">
    </div>
    <div class="spinner-group">
      <label>echoes</label>
      <input type="number" id="sp-echoes" min="0" max="1" step="0.1" value="0.0">
    </div>
    <div class="spinner-group">
      <label>gives</label>
      <input type="number" id="sp-gives" min="0" max="1" step="0.1" value="0.0">
    </div>
    <button id="editor-save-btn">Save</button>
    <button id="editor-delete-btn" style="display:none">Delete</button>
    <button id="editor-clone-btn" style="display:none">Clone</button>
  </div>
  <div id="clone-panel" style="display:none">
    <input type="text" id="clone-name-input" placeholder="New cluster name">
    <button id="clone-confirm-btn">Confirm</button>
    <button id="clone-cancel-btn">Cancel</button>
  </div>
  <div id="label-tooltip"></div>
  <div id="user-count-panel"></div>
  <button id="back-btn">←</button>
  <div id="pair-control">
    <button id="chat-btn">Join</button>
    <span id="pair-status"></span>
  </div>
  <div id="dev-panel">
    <input type="password" id="dev-code" placeholder="code" autocomplete="off">
    <button class="dev-btn" id="dev-write">Write</button>
    <button class="dev-btn" id="dev-reset">Reset</button>
    <span id="dev-status"></span>
    <label id="edit-mode-label"><input type="checkbox" id="edit-mode-cb"> Edit</label>
  </div>

  <div id="loading-overlay">
    <div id="loading-box">
      <p id="loading-msg">Connecting…</p>
    </div>
  </div>
  <div id="session-expired">
    <div id="session-expired-box">
      <p>Your session has expired due to inactivity — please reload to start a new session.</p>
      <button onclick="location.reload()">Reload</button>
    </div>
  </div>

  <!-- CDN libraries: load order matters — fcose registers itself against cytoscape -->
  <script src="https://unpkg.com/cytoscape@3/dist/cytoscape.min.js"></script>
  <script src="https://unpkg.com/layout-base@2/layout-base.js"></script>
  <script src="https://unpkg.com/cose-base@2/cose-base.js"></script>
  <script src="https://unpkg.com/cytoscape-fcose@2/cytoscape-fcose.js"></script>
  <!-- Socket.IO client (2026-07-13). Auto-served by the socket.io server. -->
  <script src="/socket.io/socket.io.js"></script>
  <script type="module" src="viewer.js?v=404"></script>
</body>
</html>
