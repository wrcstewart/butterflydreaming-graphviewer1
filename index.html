<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ButterflyDreaming — Graph Viewer</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="cy"></div>
  <button id="reset-btn">reset</button>
  <div id="label-tooltip"></div>

  <!-- CDN libraries: load order matters — fcose registers itself against cytoscape -->
  <script src="https://unpkg.com/cytoscape@3/dist/cytoscape.min.js"></script>
  <script src="https://unpkg.com/layout-base@2/layout-base.js"></script>
  <script src="https://unpkg.com/cose-base@2/cose-base.js"></script>
  <script src="https://unpkg.com/cytoscape-fcose@2/cytoscape-fcose.js"></script>
  <script src="https://unpkg.com/neo4j-driver@4/lib/browser/neo4j-web.min.js"></script>

  <!-- Password config — gitignored; falls back to a prompt if missing -->
  <script src="config.js" onerror="void 0"></script>

  <script src="viewer.js?v=18"></script>
</body>
</html>
