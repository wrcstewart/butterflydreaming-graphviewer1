<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ButterflyDreaming — Graph Viewer</title>
  <link rel="stylesheet" href="style.css?v=51">
</head>
<body>
  <div id="title-bar">Butterfly Dreaming — Navigation Development</div>
  <div id="bc-spacer"></div>
  <div id="help-bar"><span id="help-text"></span></div>
  <div id="cy-buddy"></div>
  <div id="cy-you"></div>
  <div id="cy"></div>
  <div id="media-bar"></div>
  <div id="cluster-editor-bar" style="display:none">
    <div class="spinner-group">
      <label>tagged_as</label>
      <input type="number" id="sp-tagged-as" min="0" max="1" step="0.1" value="0.5">
    </div>
    <div class="spinner-group">
      <label>resonates_with</label>
      <input type="number" id="sp-resonates-with" min="0" max="1" step="0.1" value="0.0">
    </div>
    <div class="spinner-group">
      <label>bridges_to</label>
      <input type="number" id="sp-bridges-to" min="0" max="1" step="0.1" value="0.0">
    </div>
    <div class="spinner-group">
      <label>echoes</label>
      <input type="number" id="sp-echoes" min="0" max="1" step="0.1" value="0.0">
    </div>
    <div class="spinner-group">
      <label>gives</label>
      <input type="number" id="sp-gives" min="0" max="1" step="0.1" value="0.0">
    </div>
    <button id="editor-save-btn">Save</button>
    <button id="editor-delete-btn" style="display:none">Delete</button>
    <button id="editor-clone-btn" style="display:none">Clone</button>
  </div>
  <div id="clone-panel" style="display:none">
    <input type="text" id="clone-name-input" placeholder="New cluster name">
    <button id="clone-confirm-btn">Confirm</button>
    <button id="clone-cancel-btn">Cancel</button>
  </div>
  <div id="label-tooltip"></div>
  <div id="user-count-panel"></div>
  <button id="back-btn">←</button>
  <div id="pair-control">
    <button id="pair-btn">Pair</button>
    <span id="pair-status"></span>
  </div>
  <div id="dev-panel">
    <input type="password" id="dev-code" placeholder="code" autocomplete="off">
    <button class="dev-btn" id="dev-write">Write</button>
    <button class="dev-btn" id="dev-reset">Reset</button>
    <span id="dev-status"></span>
    <label id="edit-mode-label"><input type="checkbox" id="edit-mode-cb"> Edit</label>
  </div>

  <div id="loading-overlay">
    <div id="loading-box">
      <p id="loading-msg">Connecting…</p>
    </div>
  </div>
  <div id="session-expired">
    <div id="session-expired-box">
      <p>Your session has expired due to inactivity — please reload to start a new session.</p>
      <button onclick="location.reload()">Reload</button>
    </div>
  </div>

  <!-- CDN libraries: load order matters — fcose registers itself against cytoscape -->
  <script src="https://unpkg.com/cytoscape@3/dist/cytoscape.min.js"></script>
  <script src="https://unpkg.com/layout-base@2/layout-base.js"></script>
  <script src="https://unpkg.com/cose-base@2/cose-base.js"></script>
  <script src="https://unpkg.com/cytoscape-fcose@2/cytoscape-fcose.js"></script>
  <script src="viewer.js?v=266"></script>
</body>
</html>
